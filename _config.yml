title: QAL ERP Documentation
description: Official user documentation for QAL ERP — Accounting, Finance, and more.
baseurl: "/qal-erp-docs"
url: ""

# Theme
remote_theme: just-the-docs/just-the-docs

# Just the Docs configuration
color_scheme: default

# Logo (optional — replace with your actual logo path if available)
# logo: "/assets/images/logo.png"

# Aux links (top-right nav)
aux_links:
  "QAL ERP Login":
    - "https://qbs-test.qfl.com.bd"

aux_links_new_tab: true

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Footer
footer_content: "Copyright &copy; 2026 QAL ERP. All rights reserved."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true

# Navigation
nav_sort: order   # use 'nav_order' front matter to control order

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Exclude from build
exclude:
  - "*.gemspec"
  - "node_modules"
  - "vendor"
  - Gemfile
  - Gemfile.lock
